version: '3.8'

networks:
  cab-network:
    driver: bridge
    name: cab-network

volumes:
  postgres_data:
    name: cab-postgres-data
  mongodb_data:
    name: cab-mongodb-data
  redis_data:
    name: cab-redis-data
  rabbitmq_data:
    name: cab-rabbitmq-data

services:
  # ==================== POSTGRESQL ====================
  postgres:
    image: postgres:15-alpine
    container_name: cab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: postgres  # Default DB
      # Script tạo nhiều databases
      POSTGRES_MULTIPLE_DATABASES: auth_db,user_db,payment_db,review_db,driver_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - cab-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: 
      - "postgres"
      - "-c"
      - "max_connections=200"
      - "-c"
      - "shared_buffers=256MB"

  # ==================== MONGODB ====================
  mongodb:
    image: mongo:7-jammy
    container_name: cab-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: admin
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./infrastructure/docker/mongodb/init.js:/docker-entrypoint-initdb.d/init.js
    networks:
      - cab-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')", "--quiet"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: ["mongod", "--auth"]

  # ==================== REDIS ====================
  redis:
    image: redis:7-alpine
    container_name: cab-redis
    restart: unless-stopped
    command: >
      redis-server 
      --requirepass password123 
      --appendonly yes
      --save 900 1
      --save 300 10
      --save 60 10000
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - cab-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "password123", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== RABBITMQ ====================
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: cab-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: password123
      RABBITMQ_DEFAULT_VHOST: /
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbit log_levels [{connection,error},{channel,error}]
    ports:
      - "5672:5672"   # AMQP protocol cho ứng dụng
      - "15672:15672" # Management UI
      - "25672:25672" # Clustering port
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./infrastructure/docker/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json
    networks:
      - cab-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== PGADMIN (Optional - quản lý PostgreSQL) ====================
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: cab-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@cab.com
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - ./infrastructure/docker/pgadmin/servers.json:/pgadmin4/servers.json
    networks:
      - cab-network
    depends_on:
      - postgres
    profiles:
      - tools

  # ==================== REDIS COMMANDER (Optional - quản lý Redis) ====================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: cab-redis-commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:cab-redis:6379:0:password123
      HTTP_USER: admin
      HTTP_PASSWORD: admin123
    ports:
      - "8081:8081"
    networks:
      - cab-network
    depends_on:
      - redis
    profiles:
      - tools

  # ==================== MONGO-EXPRESS (Optional - quản lý MongoDB) ====================
  mongo-express:
    image: mongo-express:latest
    container_name: cab-mongo-express
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password123
      ME_CONFIG_MONGODB_SERVER: cab-mongodb
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin123
    ports:
      - "8082:8081"
    networks:
      - cab-network
    depends_on:
      - mongodb
    profiles:
      - tools